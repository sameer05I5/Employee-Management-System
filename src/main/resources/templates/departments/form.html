<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Department')}"></head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div th:replace="~{fragments/layout :: layout-shell(~{::#main-content})}">
        <div id="main-content" class="space-y-6 max-w-xl mx-auto">

            <!-- Title -->
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="${departmentForm.id == null} ? 'Create New Department' : 'Edit Department'">Manage Department</h1>
                <p class="text-xs text-slate-500 mt-1">Provide department codes, structural descriptions, and leaders.</p>
            </div>

            <!-- Form Card -->
            <div class="glass-card p-8 rounded-2xl border border-slate-800/80 relative overflow-hidden">
                <!-- Decorative background -->
                <div class="absolute -top-12 -left-12 w-48 h-48 rounded-full bg-indigo-600/5 blur-3xl"></div>

                <!-- Alert -->
                <div th:if="${error}" class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex gap-3 items-center">
                    <i class="fa-solid fa-circle-exclamation text-lg"></i>
                    <span th:text="${error}">Error details</span>
                </div>

                <form th:action="${departmentForm.id == null} ? @{/departments} : @{/departments/edit/{id}(id=${departmentForm.id})}" 
                      th:object="${departmentForm}" method="POST" class="space-y-5 relative z-10">
                    
                    <input type="hidden" th:field="*{id}">

                    <div>
                        <label for="name" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Department Name</label>
                        <input id="name" th:field="*{name}" type="text" required placeholder="Engineering" 
                               class="w-full px-4 py-3 rounded-xl form-input-dark">
                    </div>

                    <div>
                        <label for="code" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Department Code</label>
                        <input id="code" th:field="*{code}" type="text" required placeholder="ENG" 
                               class="w-full px-4 py-3 rounded-xl form-input-dark font-mono text-sm uppercase">
                    </div>

                    <div>
                        <label for="departmentHeadId" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Department Manager / Head</label>
                        <select id="departmentHeadId" th:field="*{departmentHeadId}" 
                                class="w-full px-4 py-3 rounded-xl form-input-dark bg-slate-900">
                            <option value="">Select Department Head...</option>
                            <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.fullName}"></option>
                        </select>
                    </div>

                    <div>
                        <label for="description" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Structural Description</label>
                        <textarea id="description" th:field="*{description}" rows="4" placeholder="Describe the focus and goals of this department..." 
                                  class="w-full px-4 py-3 rounded-xl form-input-dark"></textarea>
                    </div>

                    <!-- Actions -->
                    <div class="pt-4 border-t border-slate-800 flex justify-end gap-3">
                        <a th:href="@{/departments}" class="px-5 py-2.5 rounded-xl border border-slate-800 hover:bg-slate-800 font-semibold text-xs text-slate-400 hover:text-white transition">Cancel</a>
                        <button type="submit" class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold text-xs text-white transition flex items-center gap-2 shadow-lg shadow-indigo-600/25">
                            <i class="fa-solid fa-floppy-disk"></i> Save Department
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>
</html>
