<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Pending Approvals')}"></head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div th:replace="~{fragments/layout :: layout-shell(~{::#main-content})}">
        <div id="main-content" class="space-y-6">

            <!-- Title header -->
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Pending Leave Approvals</h1>
                <p class="text-xs text-slate-500 mt-1">Review team time-off request arguments and approve/reject claims.</p>
            </div>

            <!-- Pending Lists Table -->
            <div class="glass-card rounded-2xl overflow-hidden border border-slate-800/80">
                <div class="overflow-x-auto">
                    <table class="table-dark">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Leave Type</th>
                                <th>Dates</th>
                                <th>Reason / Arguments</th>
                                <th class="text-right">Decision Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="req : ${pendingList}">
                                <td>
                                    <div class="flex items-center gap-2.5">
                                        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center font-bold text-white text-xs">
                                            <span th:text="${#strings.substring(req.employeeName, 0, 1)}">U</span>
                                        </div>
                                        <span th:text="${req.employeeName}" class="font-semibold text-slate-200">Jane Doe</span>
                                    </div>
                                </td>
                                <td>
                                    <span th:text="${req.leaveType}" class="font-semibold text-slate-300">SICK</span>
                                </td>
                                <td class="text-slate-300 text-xs">
                                    <span th:text="${#temporals.format(req.startDate, 'MMM dd, yyyy')}">Jun 25</span>
                                    to
                                    <span th:text="${#temporals.format(req.endDate, 'MMM dd, yyyy')}">Jun 26</span>
                                </td>
                                <td th:text="${req.reason}" class="text-slate-400 text-xs max-w-sm truncate" th:title="${req.reason}">Dentist checkup</td>
                                <td class="text-right">
                                    <div class="flex justify-end gap-2.5">
                                        <!-- Approve Action Form -->
                                        <form th:action="@{/leaves/approve/{id}(id=${req.id})}" method="POST" class="inline">
                                            <button type="submit" class="px-3.5 py-1.5 rounded-lg bg-emerald-600/90 hover:bg-emerald-500 text-white font-semibold text-xs transition">
                                                <i class="fa-solid fa-check"></i> Approve
                                            </button>
                                        </form>
                                        <!-- Reject Action Form -->
                                        <form th:action="@{/leaves/reject/{id}(id=${req.id})}" method="POST" class="inline">
                                            <button type="submit" class="px-3.5 py-1.5 rounded-lg bg-rose-600/90 hover:bg-rose-500 text-white font-semibold text-xs transition">
                                                <i class="fa-solid fa-xmark"></i> Reject
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(pendingList)}">
                                <td colspan="5" class="text-center py-8 text-slate-500 text-sm">No pending leave requests to review. Excellent!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
