<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Employee')}"></head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div th:replace="~{fragments/layout :: layout-shell(~{::#main-content})}">
        <div id="main-content" class="space-y-6 max-w-4xl mx-auto">

            <!-- Title -->
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight" th:text="${employeeForm.id == null} ? 'Add New Employee' : 'Edit Employee Profile'">Manage Employee</h1>
                <p class="text-xs text-slate-500 mt-1">Provide workplace details, salary metrics, and access roles below.</p>
            </div>

            <!-- Form Card -->
            <div class="glass-card p-8 rounded-2xl border border-slate-800/80 relative overflow-hidden">
                <!-- Decorative background -->
                <div class="absolute -top-12 -left-12 w-48 h-48 rounded-full bg-indigo-600/5 blur-3xl"></div>

                <!-- Alert -->
                <div th:if="${error}" class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex gap-3 items-center">
                    <i class="fa-solid fa-circle-exclamation text-lg"></i>
                    <span th:text="${error}">Error details</span>
                </div>

                <form th:action="${employeeForm.id == null} ? @{/employees} : @{/employees/edit/{id}(id=${employeeForm.id})}" 
                      th:object="${employeeForm}" method="POST" class="space-y-6 relative z-10">
                    
                    <input type="hidden" th:field="*{id}">

                    <h3 class="font-bold text-sm text-indigo-400 uppercase tracking-wider border-b border-slate-800 pb-2">1. Personal Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="fullName" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Full Name</label>
                            <input id="fullName" th:field="*{fullName}" type="text" required placeholder="John Doe" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                        </div>
                        
                        <div>
                            <label for="email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                            <input id="email" th:field="*{email}" type="email" required placeholder="john@company.com" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                        </div>

                        <div>
                            <label for="phone" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
                            <input id="phone" th:field="*{phone}" type="text" placeholder="+1 555-1234" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                        </div>

                        <div>
                            <label for="emergencyContact" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Emergency Contact</label>
                            <input id="emergencyContact" th:field="*{emergencyContact}" type="text" placeholder="Sarah: +1 555-5678" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                        </div>
                    </div>

                    <div>
                        <label for="address" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Mailing Address</label>
                        <input id="address" th:field="*{address}" type="text" placeholder="123 Main St, Apartment 4B, San Jose, CA" 
                               class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                    </div>

                    <h3 class="font-bold text-sm text-indigo-400 uppercase tracking-wider border-b border-slate-800 pb-2">2. Job &amp; Compensations</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="employeeId" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Employee ID</label>
                            <input id="employeeId" th:field="*{employeeId}" type="text" placeholder="EMP-001 (Auto generated if blank)" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark font-mono text-xs">
                        </div>

                        <div>
                            <label for="designation" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Designation</label>
                            <input id="designation" th:field="*{designation}" type="text" placeholder="Software Engineer" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                        </div>

                        <div>
                            <label for="salary" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Basic Annual Salary ($)</label>
                            <input id="salary" th:field="*{salary}" type="number" step="0.01" required placeholder="80000.00" 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark text-emerald-400 font-semibold">
                        </div>

                        <div>
                            <label for="joiningDate" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Joining Date</label>
                            <input id="joiningDate" th:field="*{joiningDate}" type="date" required 
                                   class="w-full px-4 py-2.5 rounded-xl form-input-dark">
                        </div>

                        <div>
                            <label for="departmentId" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Department Assignment</label>
                            <select id="departmentId" th:field="*{departmentId}" 
                                    class="w-full px-4 py-2.5 rounded-xl form-input-dark bg-slate-900">
                                <option value="">Select Department...</option>
                                <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                            </select>
                        </div>

                        <div>
                            <label for="managerId" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Manager Assignment</label>
                            <select id="managerId" th:field="*{managerId}" 
                                    class="w-full px-4 py-2.5 rounded-xl form-input-dark bg-slate-900">
                                <option value="">Select Manager...</option>
                                <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.fullName}"></option>
                            </select>
                        </div>

                        <div>
                            <label for="status" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Employment Status</label>
                            <select id="status" th:field="*{status}" 
                                    class="w-full px-4 py-2.5 rounded-xl form-input-dark bg-slate-900">
                                <option value="ACTIVE">Active</option>
                                <option value="INACTIVE">Inactive</option>
                                <option value="SUSPENDED">Suspended</option>
                            </select>
                        </div>

                        <div>
                            <label for="role" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Security / Portal Role</label>
                            <select id="role" th:field="*{role}" 
                                    class="w-full px-4 py-2.5 rounded-xl form-input-dark bg-slate-900">
                                <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${#strings.replace(r.name(), 'ROLE_', '')}"></option>
                            </select>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="pt-4 border-t border-slate-800 flex justify-end gap-3">
                        <a th:href="@{/employees}" class="px-5 py-2.5 rounded-xl border border-slate-800 hover:bg-slate-800 font-semibold text-xs text-slate-400 hover:text-white transition">Cancel</a>
                        <button type="submit" class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold text-xs text-white transition flex items-center gap-2 shadow-lg shadow-indigo-600/25">
                            <i class="fa-solid fa-floppy-disk"></i> Save Employee Profile
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>
</html>
